<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Slow Terrarium — Earth Globe</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}
body {
  background: #DBE9DF;
  display: flex; flex-direction: column;
  min-height: 100vh;
  padding: 24px 32px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  line-height: 1.3;
}
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translateY(-20px);
}
#phone-title {
  position: absolute;
  top: 25px;
  left: 33px;
  font-size: 28px;
  font-weight: 700;
  color: #73CCA3;
  letter-spacing: -0.01em;
  z-index: 3;
  pointer-events: none;
}
#canvas-wrap {
  width: 384px; height: 768px;
  background: #ffffff;
  border-radius: 40px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  touch-action: none;
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}
canvas { display:block; cursor:grab; touch-action: none; }
canvas:active { cursor:grabbing; }

#cards {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 268px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 16px 24px 28px;
  background: transparent;
  z-index: 2;
  pointer-events: none;
}
.card {
  background: #f4f8f5;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card .name { font-size: 13px; color: #666; font-weight: 600; }
.card .score { font-size: 26px; color: #73CCA3; font-weight: 700; line-height: 1.1; }

#sliders {
  width: 384px;
  height: 768px;
  background: #ffffff;
  border-radius: 0 40px 40px 0;
  padding: 90px 28px 28px 56px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 24px;
  margin-left: -32px;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
#sliders h2 {
  font-size: 16px;
  color: #888;
  font-weight: 500;
  margin-top: 5px;
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}
.slider-row { display: flex; flex-direction: column; gap: 9px; }
.slider-row .label-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 15px; color: #73CCA3;
}
.slider-row .label { font-weight: 600; color: #73CCA3; }
.slider-row .value { font-variant-numeric: tabular-nums; color: #73CCA3; font-size: 14px; font-weight: 600; }
.slider-row input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 8px; border-radius: 4px;
  background: #e0e0e0; outline: none;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: #73CCA3; cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.slider-row input[type="range"]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%;
  background: #73CCA3; cursor: pointer; border: none;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

#submit-btn {
  margin-top: 2px;
  padding: 10px 32px;
  border-radius: 999px;
  background: #73CCA3;
  color: #ffffff;
  font-size: 16px;
  font-weight: 700;
  line-height: 1.2;
  border: none;
  cursor: pointer;
  align-self: center;
  box-shadow: 0 4px 12px rgba(115, 204, 163, 0.4);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  letter-spacing: 0.02em;
  font-family: inherit;
}
#submit-btn:hover { box-shadow: 0 6px 16px rgba(115, 204, 163, 0.5); }
#submit-btn:active { transform: scale(0.97); }

#triggers {
  margin-top: -2px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#triggers h3 {
  font-size: 16px;
  color: #888;
  font-weight: 500;
  letter-spacing: 0.02em;
}
#trigger-buttons {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
}
.trigger-btn {
  padding: 5px 14px;
  border-radius: 999px;
  background: transparent;
  color: #73CCA3;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.2;
  border: 1px solid #73CCA3;
  cursor: pointer;
  transition: background 0.1s ease;
  white-space: nowrap;
  font-family: inherit;
}
.trigger-btn:hover { background: rgba(115, 204, 163, 0.12); }
.trigger-btn:active { transform: scale(0.97); }
</style>
</head>
<body>
<main>
<div id="canvas-wrap">
  <div id="phone-title">Wellness Planet</div>
  <canvas id="globe" width="384" height="768"></canvas>
  <div id="cards">
    <div class="card"><div class="name">잘 움직이기</div><div class="score" id="card-move">72</div></div>
    <div class="card"><div class="name">잘 쉬기</div><div class="score" id="card-rest">60</div></div>
    <div class="card"><div class="name">잘 가꾸기</div><div class="score" id="card-groom">48</div></div>
    <div class="card"><div class="name">잘 다스리기</div><div class="score" id="card-manage">80</div></div>
  </div>
</div>

<div id="sliders">
  <h2>점수 컨트롤</h2>
  <div class="slider-row">
    <div class="label-row"><span class="label">잘 움직이기</span><span class="value" id="val-move">72</span></div>
    <input type="range" min="0" max="100" value="72" id="slider-move">
  </div>
  <div class="slider-row">
    <div class="label-row"><span class="label">잘 쉬기</span><span class="value" id="val-rest">60</span></div>
    <input type="range" min="0" max="100" value="60" id="slider-rest">
  </div>
  <div class="slider-row">
    <div class="label-row"><span class="label">잘 가꾸기</span><span class="value" id="val-groom">48</span></div>
    <input type="range" min="0" max="100" value="48" id="slider-groom">
  </div>
  <div class="slider-row">
    <div class="label-row"><span class="label">잘 다스리기</span><span class="value" id="val-manage">80</span></div>
    <input type="range" min="0" max="100" value="80" id="slider-manage">
  </div>
  <button id="submit-btn">입력</button>
  <div id="triggers">
    <h3>트리거</h3>
    <div id="trigger-buttons">
      <button class="trigger-btn">100번째 방문</button>
      <button class="trigger-btn">지난 한 달 간 미접속</button>
      <button class="trigger-btn">할로윈 이벤트</button>
      <button class="trigger-btn">동일연령 총점 평균보다 낮음</button>
      <button class="trigger-btn">잘 다스리기 20점 하락</button>
    </div>
  </div>
</div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/meshoptimizer@0.20.0/meshopt_decoder.js"></script>
<script>
const W = 384, H = 768;
const canvas = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0xffffff, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.VSMShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(25, W/H, 0.1, 100);
const CAM_Z = 12;
const CAM_Y = -0.72;
const Z_MIN = 3;     // 최대 확대
const Z_MAX = 10;    // 최대 축소
camera.position.set(0, CAM_Y, CAM_Z);

// 조명 — 모두 world 공간 고정. 균등한 base 광(ambient+hemi) + 약한 한 방향 sun.
// 양쪽 sun 없음 → terminator 음영 띠 안 생김. 어디서 봐도 균등.
const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);
const hemi = new THREE.HemisphereLight(0xffffff, 0x8a909a, 0.7);
scene.add(hemi);
// 약한 directional — 음영 살짝만 (입체감용) + 매우 은은한 그림자.
const sun = new THREE.DirectionalLight(0xfff4e0, 0.25);
sun.position.set(3, 4, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 20;
sun.shadow.camera.left = -2;
sun.shadow.camera.right = 2;
sun.shadow.camera.top = 2;
sun.shadow.camera.bottom = -2;
sun.shadow.bias = -0.0005;
sun.shadow.radius = 8;
sun.shadow.blurSamples = 16;
scene.add(sun);

// 대기층
const atmGeo = new THREE.SphereGeometry(1.013, 64, 64);

  color: 0x88ccff, transparent: true, opacity: 0.07,
  side: THREE.BackSide,
});
scene.add(new THREE.Mesh(atmGeo, atmMat));

// ─── 대륙 픽셀 맵 (지표면 색상 텍스처를 읽어 육상/해상 판정) ───
// 라임(대륙): G 우세  /  하늘색(바다): B 우세
let landPx = null;  // { data, w, h }
const landReady = new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    const cx = c.getContext('2d');
    cx.drawImage(img, 0, 0);
    landPx = {
      data: cx.getImageData(0, 0, c.width, c.height).data,
      w: c.width, h: c.height
    };
    resolve();
  };
  img.src = colorData;
});

function isLandUV(u, v) {
  if (!landPx) return false;
  const px = Math.floor(u * (landPx.w - 1));
  const py = Math.floor(v * (landPx.h - 1));
  const i = (py * landPx.w + px) * 4;
  const g = landPx.data[i + 1];
  const b = landPx.data[i + 2];
  return g > b + 15;  // 녹색이 파랑보다 확실히 크면 대륙
}

// UV → SphereGeometry 의 3D 방향. 기본 SphereGeometry 매핑:
//   x = -cos(phi)*sin(theta),  y = cos(theta),  z = sin(phi)*sin(theta)
//   theta = v*PI (북극→남극),  phi = u*2PI
function uvToDir(u, v) {
  const theta = v * Math.PI;
  const phi = u * 2 * Math.PI;
  return new THREE.Vector3(
    -Math.cos(phi) * Math.sin(theta),
     Math.cos(theta),
     Math.sin(phi) * Math.sin(theta)
  ).normalize();
}

// 구면 위 균등 분포 샘플 → 대륙일 때까지 재시도
function pickRandomLandDir() {
  for (let i = 0; i < 500; i++) {
    const u = Math.random();
    const v = Math.acos(2 * Math.random() - 1) / Math.PI;  // 극 오버샘플 방지
    if (isLandUV(u, v)) return uvToDir(u, v);
  }
  return new THREE.Vector3(0, 0, 1);  // 비상용 fallback
}

// ─── 사자 (대륙 위에 랜덤 배치, 지구 회전과 함께 움직임) ───
const EARTH_R = 1.015;                       // displacement 고려한 표면 반경
const LION_SCALE = 0.18;                     // 보상 모델 공통 스케일 (블렌더에서 상대 크기는 미리 맞춤)

const gltfLoader = new THREE.GLTFLoader();
gltfLoader.setMeshoptDecoder(MeshoptDecoder);

const PLACEMENT_R = 1.005;  // 보상 모델 발이 표면에 닿게 (1.015 surface 평균보다 살짝 안쪽)

const lionReady = new Promise((resolve, reject) => {
  gltfLoader.load('assets/models/glb_activity/lion_pbr.glb',
    gltf => resolve(gltf.scene),
    undefined,
    err => reject(err));
});

Promise.all([landReady, lionReady]).then(([_, lion]) => {
  // GLB 머티리얼 보정 + 그림자 캐스팅
  lion.traverse(o => {
    if (o.isMesh) {
      o.castShadow = true;
      if (o.material && o.material.isMeshStandardMaterial) {
        o.material.metalness = 0;
        o.material.roughness = 0.7;
        o.material.needsUpdate = true;
      }
    }
  });

  // 모델 원점이 발이 아닐 수 있으므로 bounding box로 발 정렬
  const box = new THREE.Box3().setFromObject(lion);
  const center = new THREE.Vector3(); box.getCenter(center);
  lion.position.set(-center.x, -box.min.y, -center.z);

  const wrapper = new THREE.Group();
  wrapper.add(lion);
  wrapper.scale.setScalar(LION_SCALE);

  // 대륙 위에 랜덤 배치 (지구 자전과 함께 이동)
  const dir = pickRandomLandDir();
  wrapper.position.copy(dir).multiplyScalar(PLACEMENT_R);
  wrapper.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);

  earth.add(wrapper);
}).catch(err => console.error('사자 로드 실패:', err));

let _isMulti = false;
let _multiStartDist = 0, _multiStartMidX = 0, _multiStartMidY = 0;
let _multiStartCamZ = 0, _multiStartViewOX = 0, _multiStartViewOY = 0;
let _downX = 0, _downY = 0, _downHitEarth = false;
let viewOX = 0, viewOY = 0;
let autoRotate = true;
const ROTATE_SENS = 0.006;
const TAP_THRESHOLD = 8;        // px — 이동량이 이보다 작으면 탭/클릭으로 간주

const _raycaster = new THREE.Raycaster();
const _ndc = new THREE.Vector2();
function isEarthHit(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  _ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  _ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  _raycaster.setFromCamera(_ndc, camera);
  return _raycaster.intersectObject(earth, false).length > 0;
}

function resetView() {
  camera.position.set(0, CAM_Y, CAM_Z);
  viewOX = 0; viewOY = 0;
  applyViewOffset();
  _earthQ.identity();
  earth.quaternion.copy(_earthQ);
  autoRotate = true;             // 자전 재개
}

function applyViewOffset() {
  if (viewOX === 0 && viewOY === 0) camera.clearViewOffset();
  else camera.setViewOffset(W, H, viewOX, viewOY, W, H);
}

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  _pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  try { canvas.setPointerCapture(e.pointerId); } catch {}

  // 첫 포인터일 때만 탭 판정용 시작 위치·hit 기록
  if (_pointers.size === 1) {
    _downX = e.clientX; _downY = e.clientY;
    _downHitEarth = isEarthHit(e.clientX, e.clientY);
  }

  // 두 손가락(터치) 진입 → 핀치 줌 + 팬 모드 시작, 단일 모드 종료
  if (e.pointerType === 'touch' && _pointers.size === 2) {
    _isRot = false; _isPan = false; _isMulti = true;
    const arr = [..._pointers.values()];
    _multiStartDist  = Math.hypot(arr[0].x - arr[1].x, arr[0].y - arr[1].y) || 1;
    _multiStartMidX  = (arr[0].x + arr[1].x) / 2;
    _multiStartMidY  = (arr[0].y + arr[1].y) / 2;
    _multiStartCamZ  = camera.position.z;
    _multiStartViewOX = viewOX; _multiStartViewOY = viewOY;
    return;
  }

  if (_pointers.size > 1) return; // 두 손가락 모드 중 추가 입력 무시
  autoRotate = false;
  if (e.button === 2 || (e.button === 0 && e.shiftKey)) {
    _isPan = true;
    _panPrevX = e.clientX; _panPrevY = e.clientY;
    canvas.style.cursor = 'move';
  } else {  // button 0 (좌클릭) 또는 터치
    _isRot = true;
    _rotPrevX = e.clientX; _rotPrevY = e.clientY;
    canvas.style.cursor = 'grabbing';
  }
});

window.addEventListener('pointermove', e => {
  if (_pointers.has(e.pointerId)) _pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (_isMulti && _pointers.size === 2) {
    const arr = [..._pointers.values()];
    const dist = Math.hypot(arr[0].x - arr[1].x, arr[0].y - arr[1].y) || 1;
    const midX = (arr[0].x + arr[1].x) / 2;
    const midY = (arr[0].y + arr[1].y) / 2;
    // 핀치 줌 — 거리 비율로 카메라 z 조정
    const zRaw = _multiStartCamZ * (_multiStartDist / dist);
    camera.position.z = Math.max(Z_MIN, Math.min(Z_MAX, zRaw));
    // 두 손가락 중심 이동 → viewOffset 팬
    viewOX = _multiStartViewOX - (midX - _multiStartMidX);
    viewOY = _multiStartViewOY - (midY - _multiStartMidY);
    applyViewOffset();
    return;
  }

  if (_isPan) {
    viewOX -= (e.clientX - _panPrevX);
    viewOY -= (e.clientY - _panPrevY);
    _panPrevX = e.clientX; _panPrevY = e.clientY;
    applyViewOffset();
  } else if (_isRot) {
    const dx = e.clientX - _rotPrevX;
    const dy = e.clientY - _rotPrevY;
    const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), dx * ROTATE_SENS);
    const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), dy * ROTATE_SENS);
    _earthQ.premultiply(qX).premultiply(qY);
    earth.quaternion.copy(_earthQ);
    _rotPrevX = e.clientX; _rotPrevY = e.clientY;
  }
});

function endPointer(e) {
  _pointers.delete(e.pointerId);
  if (_pointers.size < 2) _isMulti = false;
  if (_pointers.size === 0) {
    _isRot = false; _isPan = false;
    canvas.style.cursor = 'grab';
    // 단순 탭/클릭 + 지구 미스 → 풀샷 리셋
    const dx = e.clientX - _downX;
    const dy = e.clientY - _downY;
    if (!_downHitEarth && Math.hypot(dx, dy) < TAP_THRESHOLD) {
      resetView();
    }
  } else if (_pointers.size === 1 && !_isMulti) {
    // 두 손가락 → 한 손가락 으로 줄었을 때 회전 모드로 재시작
    const last = [..._pointers.values()][0];
    _isRot = true; _isPan = false;
    _rotPrevX = last.x; _rotPrevY = last.y;
  }
}
window.addEventListener('pointerup', endPointer);
window.addEventListener('pointercancel', endPointer);

// 휠 줌 (데스크탑)
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camera.position.z = Math.max(Z_MIN, Math.min(Z_MAX, camera.position.z + e.deltaY * 0.005));
}, { passive: false });

// ─── 애니메이션 ───
const _spinQ = new THREE.Quaternion();
const _yAxis = new THREE.Vector3(0, 1, 0);
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) {
    // 자전: world +Y 축으로 작은 각도 회전. 사용자 회전과 같은 방식(premultiply).
    _spinQ.setFromAxisAngle(_yAxis, 0.003);
    _earthQ.premultiply(_spinQ);
    earth.quaternion.copy(_earthQ);
  }
  renderer.render(scene, camera);
}
animate();

// ─── (dev) 디버그용 외부 노출 ───
window.__debug = { camera, scene, earth, earthQ: _earthQ };

// ─── 슬라이더: 값 표시 동기화 ───
// 슬라이더 조작은 draft 값만 갱신. '입력' 버튼을 눌러야 scores/카드에 반영됨.
const sliderConfig = [
  { id: 'move',   valueId: 'val-move',   cardId: 'card-move'   },
  { id: 'rest',   valueId: 'val-rest',   cardId: 'card-rest'   },
  { id: 'groom',  valueId: 'val-groom',  cardId: 'card-groom'  },
  { id: 'manage', valueId: 'val-manage', cardId: 'card-manage' },
];
const scores = {};
const cardEls = {};
function paintSlider(slider) {
  const v = parseInt(slider.value, 10);
  slider.style.background =
    `linear-gradient(to right, #B2E0C9 0%, #B2E0C9 ${v}%, #e0e0e0 ${v}%, #e0e0e0 100%)`;
}
sliderConfig.forEach(({ id, valueId, cardId }) => {
  const slider = document.getElementById('slider-' + id);
  const valueLabel = document.getElementById(valueId);
  cardEls[id] = document.getElementById(cardId);
  scores[id] = parseInt(slider.value, 10);
  paintSlider(slider);
  slider.addEventListener('input', () => {
    valueLabel.textContent = slider.value;
    paintSlider(slider);
  });
});

function applyScores() {
  sliderConfig.forEach(({ id }) => {
    const slider = document.getElementById('slider-' + id);
    scores[id] = parseInt(slider.value, 10);
    cardEls[id].textContent = scores[id];
  });
}
document.getElementById('submit-btn').addEventListener('click', applyScores);
window.__scores = scores;
</script>
</body>
</html>
